name: Render Video
on:
  push:
    paths:
      - 'data/sceneData.json'
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Generate package-lock.json
        run: npm install --package-lock-only
      
      - run: npm ci
      
      - run: npm run build
      
      - uses: actions/upload-artifact@v4
        with:
          name: iamazing-promo-video
          path: out/video.mp4
