name: Render Remotion Video

on:
  push:
    paths:
      - "data/sceneData.json"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - - name: Render video
        run: npx remotion render src/index.ts iamazing out/video.mp4 --props=data/sceneData.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-video
          path: out/video.mp4

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: out/video.mp4
          name: "Video renderizado automaticamente"
          tag_name: "video-${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
