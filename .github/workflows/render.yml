name: Render Remotion Video

on:
  push:
    branches:
      - main
    paths:
      - "data/sceneData.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run build

      - name: Render video
        run: npm run render

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-video
          path: out/video.mp4

      - name: Publish release with MP4
        uses: soft
