name: Render Remotion Video

on:
  push:
    paths:
      - "data/sceneData.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Render video
        run: npm run render

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-video
          path: out/video.mp4

      - name: Publish release with MP4
        uses: softprops/action-gh-release@v2
        with:
          tag_name: iamazing-render-${{ github.run_number }}
          name: Iamazing Render ${{ github.run_number }}
          body: Render automático do vídeo Remotion baseado em data/sceneData.json.
          files: out/video.mp4
