name: Render Video
on:
  push:
    paths:
      - 'data/sceneData.json'
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - run: npm run build
      
      - uses: actions/upload-artifact@v4
        with:
          name: iamazing-promo-video
          path: out/video.mp4
          retention-days: 30
      
      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/video.mp4
          name: Video Render ${{ github.ref_name }}
